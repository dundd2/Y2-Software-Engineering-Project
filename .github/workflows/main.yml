name: Build and Release Game

on:
  push:
    tags:
      - 'Build-*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    if: startsWith(github.ref, 'refs/tags/Build-')
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        include:
          - os: windows-latest
            output_name: PropertyTycoon.exe
            asset_name: PropertyTycoon-Windows.exe
          - os: macos-latest
            output_name: PropertyTycoon
            asset_name: PropertyTycoon-macOS

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pygame
        pip install pyinstaller
        pip install -r requirements.txt
        
    - name: Build executable
      run: |
        pyinstaller --onefile --windowed --name PropertyTycoon --add-data "assets:assets" main.py
        
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: PropertyTycoon-${{ matrix.os }}
        path: dist/${{ matrix.output_name }}
        retention-days: 90
        
    - name: Extract version
      if: matrix.os == 'windows-latest'
      id: get_version
      shell: bash
      run: |
        VERSION=$(echo ${{ github.ref_name }} | sed 's/Build-//')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      if: matrix.os == 'windows-latest'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: Release-${{ steps.get_version.outputs.version }}
        release_name: Release ${{ steps.get_version.outputs.version }}
        draft: false
        prerelease: false
        
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      if: matrix.os == 'windows-latest'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./dist/${{ matrix.output_name }}
        asset_name: ${{ matrix.asset_name }}
        asset_content_type: application/octet-stream