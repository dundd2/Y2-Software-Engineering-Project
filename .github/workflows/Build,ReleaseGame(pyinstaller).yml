# pyinstaller version, much faster but more laggy to the game
# pls use the nuutka version if you have time to wait
# pyinstaller will pack the game in python with all the independent files 
name: Build and Release Game (pyinstaller)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        architecture: 'x64'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pygame
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build executable for Windows
      working-directory: ${{ github.workspace }}
      run: |
        pyinstaller --onefile --windowed --name PropertyTycoon --icon "${{ github.workspace }}/assets/image/icon.ico" --add-data "${{ github.workspace }}/assets;assets" main.py

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: PropertyTycoon-Windows
        path: dist/PropertyTycoon.exe
        retention-days: 90

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        architecture: 'x64'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pygame
        pip install pyinstaller
        pip install pillow
        pip install -r requirements.txt
        brew install create-dmg

    - name: Create icon script
      run: |
        echo '
        from PIL import Image
        import os
        
        os.makedirs("icon.iconset", exist_ok=True)
        
        img = Image.open("assets/image/icon.ico")
        
        sizes = [16, 32, 64, 128, 256, 512]
        for size in sizes:
            img_resized = img.resize((size, size))
            img_resized.save(f"icon.iconset/icon_{size}x{size}.png")
            img_resized.save(f"icon.iconset/icon_{size}x{size}@2x.png")
        
        os.system("iconutil -c icns icon.iconset")
        ' > create_icns.py
        python create_icns.py

    - name: Build macOS app
      working-directory: ${{ github.workspace }}
      run: |
        if [ -f "icon.icns" ]; then
          pyinstaller --windowed --name PropertyTycoon --icon icon.icns --add-data "${{ github.workspace }}/assets:assets" --osx-bundle-identifier com.example.propertytycoon main.py
        else
          pyinstaller --windowed --name PropertyTycoon --add-data "${{ github.workspace }}/assets:assets" --osx-bundle-identifier com.example.propertytycoon main.py
        fi
        
        # Ensure the app has proper permissions
        chmod -R +x dist/PropertyTycoon.app
        
        # Create a DMG file
        hdiutil create -volname "PropertyTycoon" -srcfolder dist/PropertyTycoon.app -ov -format UDZO dist/PropertyTycoon-macOS.dmg
        
        # Also create a zip as backup
        cd dist
        zip -r PropertyTycoon-macOS.zip PropertyTycoon.app
        cd ..

    - name: Upload app bundle artifact
      uses: actions/upload-artifact@v4
      with:
        name: PropertyTycoon-macOS-app
        path: dist/PropertyTycoon.app
        retention-days: 90

    - name: Upload DMG artifact
      uses: actions/upload-artifact@v4
      with:
        name: PropertyTycoon-macOS-dmg
        path: dist/PropertyTycoon-macOS.dmg
        retention-days: 90

    - name: Upload ZIP artifact
      uses: actions/upload-artifact@v4
      with:
        name: PropertyTycoon-macOS-zip
        path: dist/PropertyTycoon-macOS.zip
        retention-days: 90

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
    - name: Generate version number
      id: get_version
      shell: bash
      run: |
        VERSION=$(date +'%d.%m.20%y-%H%M%S')
        echo "version=${VERSION}" >> $GITHUB_ENV
        echo "version=${VERSION}" >> $GITHUB_OUTPUT

    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: PropertyTycoon-Windows
        path: dist-windows

    - name: Download macOS DMG artifact
      uses: actions/download-artifact@v4
      with:
        name: PropertyTycoon-macOS-dmg
        path: dist-macos-dmg
        
    - name: Download macOS ZIP artifact
      uses: actions/download-artifact@v4
      with:
        name: PropertyTycoon-macOS-zip
        path: dist-macos-zip

    - name: Create Release
      uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        files: |
          dist-windows/PropertyTycoon.exe
          dist-macos-dmg/PropertyTycoon-macOS.dmg
          dist-macos-zip/PropertyTycoon-macOS.zip
        name: Build-${{ steps.get_version.outputs.version }}
        tag_name: Build-${{ steps.get_version.outputs.version }}
        draft: false
        prerelease: false
        fail_on_unmatched_files: false